active-cap: 24
correction-interval-ticks: 20

audience:
  view-distance: 2
  simulation-distance: 2
  allow-chat: false
  allow-command: false
  allow-interact: false
  allow-move: false
  allow-look-packet: false
  block-flying-packet: true
  invulnerable: true
  collision: false
  pickup-items: false

active:
  view-distance: 6
  simulation-distance: 3
  allow-chat: true
  allow-command: true
  allow-interact: true
  allow-move: true

visibility:
  audience-see-audience: false
  audience-see-active: true
  active-see-audience: true
  active-see-active: true

position:
  world: world
  seats:
    admin-preview-1: "0.5, 80.0, 0.5, 0.0, 0.0"
    admin-preview-2: "1.5, 80.0, 0.5, 0.0, 0.0"
    admin-preview-3: "2.5, 80.0, 0.5, 0.0, 0.0"
    admin-preview-4: "3.5, 80.0, 0.5, 0.0, 0.0"
  generated-grid:
    enabled: true
    origin: "0.5, 80.0, 0.5, 0.0, 0.0"
    rows: 11
    columns: 16
    row-spacing: 1.0
    column-spacing: 1.0
    yaw: 0.0
    pitch: 0.0
